# This workflow handles version bumping and triggers the release pipeline.
#
# How to use:
# 1. Run this workflow manually from GitHub Actions on the develop branch
# 2. Select version bump type (patch/minor/major)
#
# What happens:
# 1. Version is bumped in pyproject.toml
# 2. CHANGELOG.md is updated using git-changelog
# 3. A PR is created to develop branch with auto-merge enabled (SQUASH)
# 4. After PR auto-merges, release-to-main.yml rebases develop onto main
# 5. Push to main triggers publish.yml which publishes to PyPI
#
# Required secrets:
# - PAT_GITHUB: GitHub PAT with repo + workflow scopes (for auto-merge and
#   triggering downstream workflows). Falls back to GITHUB_TOKEN if not set,
#   but auto-merge and downstream workflow triggers may not work.

name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump_version:
    name: Bump Version
    runs-on: ubuntu-latest
    # This workflow should only be run on the develop branch
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling build twine git-changelog

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: calc_version
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Bump version and generate changelog
        run: |
          NEW_VERSION="${{ steps.calc_version.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml to version $NEW_VERSION"

          # Generate changelog using git-changelog
          git-changelog --in-place --output CHANGELOG.md --provider github --bump "$NEW_VERSION"
          echo "Updated CHANGELOG.md with version $NEW_VERSION using git-changelog"

          # Commit and push to bump branch
          git checkout -b "bump-version-${NEW_VERSION}"
          git add pyproject.toml CHANGELOG.md
          git commit -m "feat: Bump version to ${NEW_VERSION} [release]"
          git push --set-upstream origin "bump-version-${NEW_VERSION}"

      - name: Create Pull Request
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PAT_GITHUB || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const version = '${{ steps.calc_version.outputs.new_version }}';
            const branchName = `bump-version-${version}`;
            const title = `feat: Bump version to ${version} [release]`;

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title: title,
              head: branchName,
              base: 'develop',
              body: [
                `## Release v${version}`,
                '',
                'This PR was automatically created by the release workflow.',
                '',
                '### Changes',
                `- Bumped version to ${version}`,
                '- Updated CHANGELOG.md',
                '',
                'This PR will auto-merge after CI passes, then automatically rebase to main and publish to PyPI.'
              ].join('\n')
            });
            core.setOutput('pr_number', pr.data.number);

            // Enable auto-merge with SQUASH method
            try {
              await github.graphql(`
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest {
                      id
                    }
                  }
                }
              `, {
                pullRequestId: pr.data.node_id,
                mergeMethod: 'SQUASH'
              });

              console.log(`PR #${pr.data.number} created with auto-merge enabled (SQUASH method)`);
            } catch (error) {
              console.error(`Failed to enable auto-merge: ${error.message}`);
              core.warning(`Auto-merge could not be enabled. Please merge manually.`);
            }
