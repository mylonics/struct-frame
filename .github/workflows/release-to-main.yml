# This workflow rebases develop into main directly (no PR, no squash, no merge commits).
#
# Automatic mode:
# - Triggers when a PR is merged to develop and checks if the PR title
#   contains [release] tag (added by the bump-version workflow).
# - If found, rebases develop onto main.
#
# Manual mode:
# - Run this workflow manually from GitHub Actions
# - Rebases develop onto main
#
# This workflow works in conjunction with release.yml to provide a streamlined
# release process.
#
# Required secrets:
# - PAT_GITHUB: GitHub PAT with repo scope. Required so that the push to main
#   triggers the publish.yml workflow. (Pushes made with GITHUB_TOKEN do not
#   trigger downstream workflows.)

name: "Auto: Merge to Release Branch"

on:
  pull_request:
    types: [closed]
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge_to_release:
    name: Rebase to Main
    # For PR events: only run if the PR was actually merged (not just closed)
    # For workflow_dispatch: always run
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_GITHUB }}

      - name: Determine release type
        id: release-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=release" >> "$GITHUB_OUTPUT"
            echo "Manual trigger: release"
          else
            PR_TITLE="${{ github.event.pull_request.title }}"
            echo "PR title: $PR_TITLE"
            if echo "$PR_TITLE" | grep -q '\[release\]'; then
              echo "type=release" >> "$GITHUB_OUTPUT"
              echo "Detected release type: release"
            else
              echo "type=none" >> "$GITHUB_OUTPUT"
              echo "No release type found in PR title, skipping."
            fi
          fi

      - name: Rebase develop into main
        if: steps.release-type.outputs.type != 'none'
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Rebasing develop into main (version ${VERSION})"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git rebase origin/develop
          git push --force-with-lease origin main

          echo "Successfully rebased develop into main"
